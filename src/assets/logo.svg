<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Steering Wheel Rim -->
  <circle cx="50" cy="50" r="42" stroke="url(#brand-grad)" stroke-width="6" filter="url(#glow)" />
  
  <!-- Steering Wheel Spokes -->
  <path d="M50 50L50 85" stroke="url(#brand-grad)" stroke-width="6" stroke-linecap="round" />
  <path d="M50 50L20 40" stroke="url(#brand-grad)" stroke-width="6" stroke-linecap="round" />
  <path d="M50 50L80 40" stroke="url(#brand-grad)" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center Hub (Extended Document / D) -->
  <rect x="36" y="32" width="28" height="36" rx="4" fill="url(#brand-grad)" />
  <path d="M42 40H58V42H42V40ZM42 46H58V48H42V46ZM42 52H54V54H42V52Z" fill="white" fill-opacity="0.8" />
</svg>
